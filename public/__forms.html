<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify Forms Registration</title>
  </head>
  <body>
    <!-- Static form definitions for Netlify form detection during build -->
    <form name="contact" method="POST" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>

    <form name="application" method="POST" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="application" />
      <input type="text" name="studentName" />
      <input type="text" name="gender" />
      <input type="text" name="dateOfBirth" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="guardianName" />
      <input type="text" name="guardianPhone" />
      <input type="email" name="guardianEmail" />
      <input type="text" name="applyingFor" />
      <input type="text" name="previousSchool" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
